version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: hoagiang-postgres
    environment:
      POSTGRES_DB: hoagiang_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hoagiang-network

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hoagiang-app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@postgres:5432/hoagiang_manager
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-key-min-32-characters}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      PORT: 4000
      UPLOAD_DIR: /app/public/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5242880}
    ports:
      - "4000:4000"
    volumes:
      - ./public/uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hoagiang-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  hoagiang-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local

